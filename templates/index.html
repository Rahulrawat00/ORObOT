<!DOCTYPE html>
<html>
<head>
<title>AI Assistant Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
:root {
    --bg: #05070a;
    --sidebar: #0a0d1a;
    --card: rgba(255, 255, 255, 0.05);
    --accent: #00e0ff;
    --accent-glow: rgba(0, 224, 255, 0.3);
    --user-bubble: #1c2558;
    --ai-bubble: rgba(255, 255, 255, 0.08);
    --text-main: #e0e0e0;
    --text-dim: #7aa7c7;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Outfit', sans-serif;
}

body {
    background: var(--bg);
    color: var(--text-main);
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* SIDEBAR - Professional Layout */
.sidebar {
    width: 260px;
    background: var(--sidebar);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    padding: 20px;
}

.logo {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-dot {
    width: 12px;
    height: 12px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
}

/* MAIN CONTENT */
.app-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
}

.chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 40px 10%;
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* RESPONSE STYLING */
.response-container {
    max-width: 850px;
    margin: 0 auto;
    width: 100%;
}

.bubble {
    padding: 18px 24px;
    border-radius: 20px;
    line-height: 1.6;
    max-width: 85%;
    position: relative;
    animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.user-text {
    align-self: flex-end;
    background: var(--user-bubble);
    border: 1px solid rgba(0, 224, 255, 0.2);
    margin-left: auto;
    border-bottom-right-radius: 4px;
}

.ai-text {
    align-self: flex-start;
    background: var(--ai-bubble);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom-left-radius: 4px;
}

.label {
    font-size: 12px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
    display: block;
    color: var(--accent);
}

/* INPUT SECTION - Fixed at bottom */
.input-area {
    padding: 30px 10%;
    background: linear-gradient(transparent, var(--bg) 40%);
}

.input-wrapper {
    max-width: 800px;
    margin: 0 auto;
    position: relative;
    background: var(--card);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 8px;
    display: flex;
    align-items: center;
    backdrop-filter: blur(20px);
    transition: 0.3s;
}

.input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
}

.input-box {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    padding: 12px 20px;
    font-size: 16px;
    outline: none;
}

/* BUTTONS */
.icon-btn {
    background: var(--accent);
    color: #000;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 18px;
    cursor: pointer;
    font-weight: 700;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.icon-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
}

.speak-btn {
    background: rgba(255, 255, 255, 0.05);
    color: white;
    margin-right: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* CENTER DECORATION (The Pulse) */
.pulse-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    z-index: -1;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        <div class="logo-dot"></div>
        AI ASSISTANT
    </div>
    <div style="color: var(--text-dim); font-size: 14px;">Recent Chats</div>
    </div>

<div class="app-container">
    <div class="pulse-bg"></div>

    <div class="chat-window">
        {% if speech_text %}
        <div class="bubble user-text">
            <span class="label">You</span>
            {{ speech_text }}
        </div>
        
        <div class="bubble ai-text">
            <span class="label">Assistant</span>
            {{ answer }}
        </div>
        {% else %}
        <div style="text-align: center; margin-top: 15vh;">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">How can I help you?</h1>
            <p style="color: var(--text-dim);">Ask me to send a message, search, or just chat.</p>
        </div>
        {% endif %}
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <form action="/listen" method="post">
                <button class="icon-btn speak-btn" type="submit" title="Speak Now"><i class="fa-solid fa-microphone"></i></button>
            </form>

            <form action="/send" method="post" style="flex: 1; display: flex;">
                <input
                    type="text"
                    name="command"
                    class="input-box"
                    placeholder="Message AI Assistant..."
                    required
                >
                <button class="icon-btn" type="submit"><i class="fa-solid fa-arrow-right"></i></button>
            </form>
        </div>
    </div>
</div>


</body>
</html>
